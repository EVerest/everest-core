settings:
  telemetry_enabled: false
active_modules:
  cgem580:
    module: CarloGavazzi_EM580
    config_implementation:
      main:
        powermeter_device_id: 1
        timezone_offset_minutes: 60
    connections:
      modbus:                         # required interface: serial_communication_hub
        - module_id: comm_hub
          implementation_id: main

  comm_hub:
    module: SerialCommHub
    config_implementation:
      main:
        serial_port: /dev/ttyUSB0     # adjust to your device path
        baudrate: 115200
        parity: 0                    # 0=None,1=Odd,2=Even (match your device)

  cli:
    config_module:
      evse_id: "DE*ENBW*BER001*EVSE01"
      tariff_text: "This is just a long string to test the tariff text functionality. The kWh price is 0.30 EUR/kWh - just joking - it is 2.30 EUR/kWh"
    module: BUPowermeter
    standalone: true
    connections:
      powermeter:
        - module_id: cgem580
          implementation_id: main
