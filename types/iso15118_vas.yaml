description: Custom VAS types for ISO 15118-20
types:
  ParameterType:
    description: Type of a parameter
    type: string
    enum:
      - Boolean
      - Int8
      - Int16
      - Int32
      - String
      - RationalNumber

  ParameterValueVariant:
    description: Value variant of a parameter -> only one of the values should be set
    type: object
    additionalProperties: false
    properties:
      value_string:
        description: String value of the parameter
        type: string
        minLength: 0
        maxLength: 80
      value_rational:
        description: Rational value of the parameter
        type: number
      value_integer:
        description: Integer value of the parameter
        type: integer
      value_bool:
        description: Boolean value of the parameter
        type: boolean

  Parameter:
    description: Single Parameter
    type: object
    additionalProperties: false
    required:
      - name
      - type
      - value
    properties:
      name:
        description: Name of the parameter
        type: string
        minLength: 1
        maxLength: 80
      type:
        description: Type of the parameter
        type: string
        $ref: /iso15118_vas#/ParameterType
      value:
        description: Value of the parameter
        type: object
        $ref: /iso15118_vas#/ParameterValueVariant

  ParameterSet:
    description: Parameter Set
    type: object
    required:
      - set_id
      - parameters
    additionalProperties: false
    properties:
      set_id:
        description: ParameterSetId
        type: integer
      parameters:
        description: List of parameters
        type: array
        items:
          type: object
          $ref: /iso15118_vas#/Parameter

  SelectedService:
    description: Selected Service
    type: object
    required:
      - service_id
      - parameter_set_id
    additionalProperties: false
    properties:
      service_id:
        description: Service ID
        type: integer
      parameter_set_id:
        description: Parameter Set ID
        type: integer
